name: Check builds
on:
  - push
  - pull_request

jobs:
  run-tests:
    name: Run tests
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Recover runner disk space
        uses: wimpysworld/nothing-but-nix@v10
      - name: Determine system features
        id: system-features
        run: |
          features="nixos-test benchmark big-parallel uid-range"
          if [ -e /dev/kvm ]; then
            features="$features kvm"
          fi
          echo "system-features=$features" >> "$GITHUB_OUTPUT"
      - name: Install Nix
        uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc
        with:
          extra-conf: |
            experimental-features = nix-command flakes auto-allocate-uids cgroups
            system-features = ${{ steps.system-features.outputs.system-features }}
            auto-omptimise-store = true
            auto-allocate-uids = true
      - name: Set up Nix caching
        uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: Run checks
        timeout-minutes: 345
        run: nix flake check

  fmt:
    name: Check formatting and evaluation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
      - name: Set up Nix caching
        if: github.ref == 'refs/heads/main'
        uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: Check formatting
        run: nix fmt -- --ci
      - name: Check evaluation
        run: nix flake check --no-build --all-systems --keep-going
